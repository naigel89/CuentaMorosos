name: iOS Build (Shared Framework)

# Triggers: on every push to main/develop, and on pull requests
on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  build-ios:
    name: Build shared framework for iOS
    runs-on: macos-14          # Apple Silicon runner with Xcode 15+

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Kotlin/Native cache ─────────────────────────────────────────────
      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      # ── 5. GoogleService-Info.plist ────────────────────────────────────────
      # The file must be stored as a GitHub Secret (base64-encoded).
      # See: Settings → Secrets and variables → Actions → New repository secret
      # Secret name: GOOGLE_SERVICE_INFO_PLIST
      # Value: base64 content of GoogleService-Info.plist
      #   Command to encode: base64 -i GoogleService-Info.plist | tr -d '\n'
      - name: Inject GoogleService-Info.plist
        if: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > iosApp/GoogleService-Info.plist
          echo "GoogleService-Info.plist injected successfully."

      - name: Skip GoogleService-Info.plist (secret not set)
        if: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST == '' }}
        run: echo "WARNING: GOOGLE_SERVICE_INFO_PLIST secret not set. Firebase will not be configured for iOS."

      # ── 6. Compile shared framework for iOS ───────────────────────────────
      - name: Compile shared framework (iosSimulatorArm64)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --stacktrace

      # ── 7. (Optional) Run commonMain unit tests ───────────────────────────
      - name: Run shared unit tests (iosSimulatorArm64)
        run: ./gradlew :shared:iosSimulatorArm64Test --continue || echo "No tests yet in shared module."

      # ── 8. Upload framework as artifact ───────────────────────────────────
      - name: Upload shared framework
        uses: actions/upload-artifact@v4
        with:
          name: shared-framework-ios-simulator
          path: shared/build/bin/iosSimulatorArm64/debugFramework/
          retention-days: 7
