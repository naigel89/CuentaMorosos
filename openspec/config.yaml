# OpenSpec Configuration — CuentaMorosos
# Generated by sdd-init on 2026-05-29

project: CuentaMorosos
description: >
  Kotlin Multiplatform Android app for managing event-based debts and expenses.
  Offline-first architecture with SQLDelight local cache and Firebase Firestore remote sync.

strict_tdd: true

stack:
  language: Kotlin 1.9.24
  platform: Android (minSdk 24, targetSdk 35) + KMP (JVM, iOS conditional)
  ui: Jetpack Compose 1.6.11 + Material 3
  data_local: SQLDelight 2.0.2 (SQLite)
  data_remote: Firebase Firestore (dev.gitlive:firebase-firestore 1.13.0)
  async: Kotlinx Coroutines 1.8.1
  di: Manual factory pattern (AppViewModelFactory)
  build: Gradle Kotlin DSL, JVM toolchain 17

architecture:
  pattern: Offline-first repository with shared KMP module
  modules:
    - app: Android entry point, Firebase native SDK, Compose UI shell
    - shared: KMP business logic, data models, repositories, ViewModels, SQLDelight
  state_management: derivedStateOf for computed properties; ViewModel lifecycle
  persistence: CuentaMorososLocalStore + SQLDelight database; persistData() after state mutations

testing:
  unit:
    runner: ./gradlew test
    framework: JUnit 4 (app), kotlin-test + kotlinx-coroutines-test (shared commonTest)
  integration:
    available: false
    note: No MockWebServer, testing-library, or integration test infrastructure detected
  e2e:
    available: false
    note: No Playwright/Cypress/Espresso E2E flows configured
  instrumentation:
    runner: ./gradlew connectedAndroidTest
    framework: AndroidJUnitRunner + Espresso 3.6.1 + Compose UI Test
  coverage:
    available: false
    note: No JaCoCo or coverage plugin configured

quality:
  linter:
    available: false
    note: No detekt or ktlint configured; relies on kotlinc warnings
  type_checker:
    available: true
    command: ./gradlew compileDebugKotlin
  formatter:
    available: false
    note: No ktfmt or ktlint --format configured

phase_rules:
  proposal:
    required_fields: [intent, scope, capabilities, approach, risks, success_criteria]
    max_lines: 100
  spec:
    required_fields: [requirements, scenarios, acceptance_criteria]
    format: markdown with requirement IDs (R001, R002...)
  design:
    required_fields: [architecture, data_flow, component_design, tradeoffs]
  tasks:
    required_fields: [description, files, acceptance]
    granularity: work-unit (commit-sized)
  apply:
    rules:
      - Implement one task at a time
      - Tests must accompany code changes
      - No build after changes
  verify:
    rules:
      - Run existing tests before and after changes
      - All new code must have test coverage
      - Verify against spec requirements
  archive:
    rules:
      - Sync delta specs to openspec/specs/
      - Move change to changes/archive/
